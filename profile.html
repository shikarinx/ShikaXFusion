<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | ShikaXFusion</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    <div class="grid-background"></div>
    <div class="orb-container"><div class="floating-orb orb-1"></div><div class="floating-orb orb-2"></div></div>

    <!-- Avatar Selection Modal (hidden by default) -->
    <div id="avatar-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Choose Your Avatar</h3>
            <div class="avatar-grid" id="avatar-grid-selector">
                <!-- Avatars will be dynamically inserted here by JS -->
            </div>
            <button id="close-modal-btn" class="modal-close-button">Close</button>
        </div>
    </div>

    <div class="app-container">
        <!-- Main Content for Profile -->
        <main class="main-content">
            <!-- Profile Header Card -->
            <div class="profile-header-card">
                <div class="profile-avatar" id="main-profile-avatar">
                    <img src="profile_dp1.png" alt="User Avatar" id="current-avatar-img">
                </div>
                <h2 class="profile-name" id="user-display-name">Loading...</h2>
                <div class="profile-balance" id="user-balance">₹0.00</div>
                <div class="profile-actions">
                    <button id="deposit-btn" class="profile-action-btn deposit">Deposit</button>
                    <button id="withdraw-btn" class="profile-action-btn withdraw">Withdraw</button>
                </div>
            </div>

            <!-- Profile Options List (Accordion) -->
            <div class="profile-options-list">
                <!-- Information -->
                <div class="accordion-item">
                    <button class="accordion-header">
                        <span>Information</span>
                        <svg class="accordion-arrow" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
                    </button>
                    <div class="accordion-panel">
                        <div class="info-list">
                            <p><strong>Name:</strong> <span id="info-name">...</span></p>
                            <p><strong>Email:</strong> <span id="info-email">...</span></p>
                            <p><strong>Number:</strong> <span id="info-number">Not Provided</span></p>
                        </div>
                    </div>
                </div>
                <!-- History -->
                <div class="accordion-item">
                    <button class="accordion-header">
                        <span>History</span>
                        <svg class="accordion-arrow" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
                    </button>
                    <div class="accordion-panel">
                        <ul class="transaction-list" id="transaction-history">
                            <!-- Transactions will be added here via console/JS -->
                            <li>No transactions yet.</li>
                        </ul>
                    </div>
                </div>
                <!-- Redeem Code -->
                <div class="accordion-item">
                    <button class="accordion-header">
                        <span>Redeem Code</span>
                        <svg class="accordion-arrow" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
                    </button>
                    <div class="accordion-panel">
                        <div class="redeem-container">
                            <input type="text" placeholder="Enter your code" class="redeem-input">
                            <button class="redeem-button">Claim</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Logout Button -->
            <button class="logout-btn" id="logout-button">Logout</button>
        </main>
        
        <!-- Bottom Navigation: "Profile" is now the active item -->
        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24"><path class="icon-fill" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Home</span></a>
            <a href="tasks.html" class="nav-item"><svg viewBox="0 0 24 24"><path class="icon-fill" d="M20.5 4.5H4.6C3.7 4 3 4.7 3 5.6v12.8C3 19.3 3.7 20 4.6 20h12.8c.9 0 1.6-.7 1.6-1.6V5.6c0-.9-.7-1.6-1.6-1.6zM18 18H6V6h12v12zM9 15h6v-2H9v2zm0-3h6v-2H9v2zm0-3h6V7H9v2z"/></svg><span>Tasks</span></a>
            <a href="rewards.html" class="nav-item"><svg viewBox="0 0 24 24"><path class="icon-fill" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg><span>Rewards</span></a>
            <a href="games.html" class="nav-item"><svg viewBox="0 0 24 24"><path class="icon-fill" d="M21.58 16.09l-1.1-1.1c-.29-.29-.69-.47-1.12-.52a5.95 5.95 0 00-2.86-2.86c-.05-.43-.23-.83-.52-1.12l-1.1-1.1a1.6 1.6 0 00-2.24 0l-1.1 1.1c-.29.29-.47-.69-.52 1.12a5.95 5.95 0 00-2.86 2.86c-.05.43-.23-.83-.52-1.12l-1.1 1.1a1.6 1.6 0 000 2.24l1.1 1.1c.29.29.69.47 1.12.52a5.95 5.95 0 002.86 2.86c.43.05.83.23 1.12.52l1.1 1.1a1.6 1.6 0 002.24 0l1.1-1.1c.29-.29.47-.69-.52-1.12a5.95 5.95 0 002.86-2.86c.05-.43.23-.83.52-1.12l1.1-1.1a1.6 1.6 0 000-2.24zM12 15a3 3 0 110-6 3 3 0 010 6z"/></svg><span>Games</span></a>
            <a href="profile.html" class="nav-item active"><svg viewBox="0 0 24 24"><path class="icon-fill" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Profile</span></a>
        </nav>
    </div>

    <!-- Firebase and Page-Specific Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Particle system code can be kept or removed
            class ParticleSystem { constructor(canvas) { this.canvas = canvas; this.ctx = canvas.getContext('2d'); this.particles = []; this.resize(); this.init(); this.animate(); window.addEventListener('resize', () => this.resize()); } resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; } init() { this.particles = []; const particleCount = 100; for (let i = 0; i < particleCount; i++) { this.particles.push({ x: Math.random() * this.canvas.width, y: Math.random() * this.canvas.height, vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5, size: Math.random() * 2 + 1, color: `hsl(${220 + Math.random() * 60}, 70%, 60%)` }); } } animate() { this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); this.particles.forEach(p => { p.x += p.vx; p.y += p.vy; if (p.x < 0 || p.x > this.canvas.width) p.vx *= -1; if (p.y < 0 || p.y > this.canvas.height) p.vy *= -1; this.ctx.fillStyle = p.color; this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); this.ctx.fill(); }); requestAnimationFrame(() => this.animate()); } }
            if(document.getElementById('particles-canvas')) new ParticleSystem(document.getElementById('particles-canvas'));

            const firebaseConfig = {
                apiKey: "AIzaSyCzFHkD5bAIjZkP1W7jj4P-FoBldmeTCpk",
                authDomain: "shikaxfusion.firebaseapp.com",
                projectId: "shikaxfusion",
                storageBucket: "shikaxfusion.appspot.com",
                messagingSenderId: "353890157797",
                appId: "1:353890157797:web:54607ce7378b97fc4d000c"
            };
            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();

            // --- Page Element References ---
            const avatarInitial = document.querySelector('.user-avatar'); // For header
            const mainAvatarContainer = document.getElementById('main-profile-avatar');
            const currentAvatarImg = document.getElementById('current-avatar-img');
            const userDisplayName = document.getElementById('user-display-name');
            const infoName = document.getElementById('info-name');
            const infoEmail = document.getElementById('info-email');
            const logoutButton = document.getElementById('logout-button');
            const accordionItems = document.querySelectorAll('.accordion-header');
            const modal = document.getElementById('avatar-modal');
            const closeModalBtn = document.getElementById('close-modal-btn');
            const avatarGrid = document.getElementById('avatar-grid-selector');

            // --- Auth Guard and Data Population ---
            auth.onAuthStateChanged(user => {
                if (user) {
                    const displayName = user.displayName || "New User";
                    if (avatarInitial) avatarInitial.textContent = displayName.charAt(0).toUpperCase();
                    userDisplayName.textContent = displayName;
                    infoName.textContent = displayName;
                    infoEmail.textContent = user.email;
                } else {
                    window.location.replace('auth.html');
                }
            });

            // --- Logout Functionality ---
            logoutButton.addEventListener('click', () => {
                auth.signOut();
            });

            // --- Accordion Functionality ---
            accordionItems.forEach(button => {
                button.addEventListener('click', () => {
                    const panel = button.nextElementSibling;
                    button.classList.toggle('active');
                    if (panel.style.maxHeight) {
                        panel.style.maxHeight = null;
                    } else {
                        panel.style.maxHeight = panel.scrollHeight + "px";
                    }
                });
            });

            // --- Avatar Modal Functionality ---
            // Populate avatar choices
            for (let i = 1; i <= 10; i++) {
                const img = document.createElement('img');
                img.src = `profile_dp${i}.png`;
                img.classList.add('avatar-choice');
                img.dataset.avatarSrc = `profile_dp${i}.png`;
                img.addEventListener('click', () => {
                    currentAvatarImg.src = img.dataset.avatarSrc;
                    modal.style.display = 'none'; // Close modal on selection
                });
                avatarGrid.appendChild(img);
            }

            // Open and Close Modal
            mainAvatarContainer.addEventListener('click', () => {
                modal.style.display = 'flex';
            });
            closeModalBtn.addEventListener('click', () => {
                modal.style.display = 'none';
            });
            window.addEventListener('click', (event) => {
                if (event.target == modal) {
                    modal.style.display = "none";
                }
            });
        });
    </script>
</body>
</html>
