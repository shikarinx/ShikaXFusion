<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShikaXFusion Admin Panel</title>
    <link rel="stylesheet" href="main.css">
    <style>
        .container { z-index: 10; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border-radius: 24px; padding: 40px; max-width: 800px; margin: 20px auto; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.2); }
        h1, h2 { font-family: 'Allura', cursive; font-weight: normal; font-size: 3rem; text-align: center; margin-bottom: 20px; color: var(--text-primary); }
        h2 { font-size: 2.5rem; margin-top: 30px; }
        hr { border: 1px solid rgba(255, 255, 255, 0.2); margin: 40px 0; }
        input, textarea, button { width: 100%; padding: 16px 20px; margin-bottom: 15px; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 16px; background: rgba(0, 0, 0, 0.4); color: var(--text-primary); font-family: 'Inter', sans-serif; font-size: 1rem; box-sizing: border-box; transition: all 0.3s ease; }
        input:focus, textarea:focus { outline: none; border-color: var(--neon-blue); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        button { cursor: pointer; }
        button:hover { transform: translateY(-2px); }
        .submit-btn { background: var(--accent-gradient); font-size: 1.2rem; font-weight: 600; }
        .item-list { padding: 0; list-style: none; }
        .item-list li { padding: 15px; background: rgba(0,0,0,0.2); border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .edit-btn, .delete-btn { width: auto; padding: 8px 15px; margin-left: 10px; font-size: 0.9rem; font-weight: 600; border-radius: 10px; }
        .edit-btn { background-color: var(--neon-blue); color: var(--bg-darker); }
        .delete-btn { background-color: var(--neon-pink); color: white; }
        .redeem-code-gen-form { display: flex; gap: 15px; align-items: center; }
        .redeem-code-gen-form input { flex-grow: 1; }
        .redeem-code-gen-form button { width: auto; flex-shrink: 0; }
        #password-form { text-align: center; }
        #password-input { margin-top: 20px; }
    </style>
</head>
<body>
    <!-- The background is simplified to prevent crashes -->
    <div class="grid-background"></div>
    <div class="orb-container"><div class="floating-orb orb-1"></div><div class="floating-orb orb-2"></div></div>

    <!-- Password Entry Container -->
    <div class="container" id="password-container">
        <h1>Admin Access</h1>
        <form id="password-form">
            <input type="password" id="password-input" placeholder="Enter Admin Password" required>
            <button type="submit" class="submit-btn">Login</button>
        </form>
    </div>

    <!-- Admin Panel (remains hidden) -->
    <div class="container" id="admin-panel" style="display:none;">
        <h1>Admin Dashboard</h1><hr><h2>Redeem Code Management</h2><form id="redeem-code-form"><div class="redeem-code-gen-form"><input type="text" id="redeem-code" placeholder="Enter or Generate Code" required><button type="button" id="generate-code-btn">Generate</button></div><input type="number" id="redeem-amount" placeholder="Reward Amount (e.g., 10)" required><input type="number" id="redeem-max-uses" placeholder="Max Uses (e.g., 100)" required><button type="submit" class="submit-btn">Create Code</button></form><h2>Active Codes</h2><ul id="code-list" class="item-list"></ul><hr><h2>Task Management</h2><form id="task-form"><input type="hidden" id="task-id"><input type="text" id="task-title" placeholder="Task Title" required><input type="text" id="task-reward" placeholder="Reward Text" required><input type="url" id="task-image-url" placeholder="Image URL (for detail page)" required><textarea id="task-details" placeholder="Full Task Details..." required rows="4"></textarea><input type="url" id="task-action-url" placeholder="Action URL" required><input type="number" id="task-order" placeholder="Display Order" required><button type="submit" class="submit-btn">Save Task</button></form><h2>Current Tasks</h2><ul id="task-list" class="item-list"></ul><hr><h2>Game Management</h2><form id="game-form"><input type="hidden" id="game-id"><input type="text" id="game-title" placeholder="Game Title" required><input type="url" id="game-image-url" placeholder="Image URL" required><input type="text" id="game-url" placeholder="Game URL" required><input type="number" id="game-order" placeholder="Display Order" required><button type="submit" class="submit-btn">Save Game</button></form><h2>Current Games</h2><ul id="game-list" class="item-list"></ul>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const passwordContainer = document.getElementById('password-container');
            const passwordForm = document.getElementById('password-form');
            const passwordInput = document.getElementById('password-input');
            const adminPanel = document.getElementById('admin-panel');
            const correctPassword = "Aashish12@";

            // This is the only code that runs when the page loads.
            // It makes the login form clickable.
            passwordForm.addEventListener('submit', (e) => {
                e.preventDefault();
                if (passwordInput.value === correctPassword) {
                    passwordContainer.style.display = 'none';
                    initializeApp(); // Only start Firebase AFTER password is correct
                } else {
                    alert("Incorrect Password!");
                    passwordInput.value = '';
                }
            });

            // This function runs ONLY after you enter the correct password.
            function initializeApp() {
                try {
                    const firebaseConfig = { apiKey: "AIzaSyCzFHkD5bAIjZkP1W7jj4P-FoBldmeTCpk", authDomain: "shikaxfusion.firebaseapp.com", projectId: "shikaxfusion", storageBucket: "shikaxfusion.appspot.com", messagingSenderId: "353890157797", appId: "1:353890157797:web:54607ce7378b97fc4d000c" };
                    if (!firebase.apps.length) {
                        firebase.initializeApp(firebaseConfig);
                    }
                    const auth = firebase.auth();
                    const db = firebase.firestore();

                    auth.onAuthStateChanged(user => {
                        if (user) {
                            adminPanel.style.display = 'block';
                            initializeAdminPanel(db);
                        } else {
                            document.body.innerHTML = `<div class="container"><h1>Access Denied</h1><p style="text-align:center; font-size: 1.2rem;">You must be logged in to the main ShikaXFusion app to use the admin panel.</p><a href="/auth" style="display:block; text-align:center; color: var(--neon-blue); margin-top:20px;">Go to Login Page</a></div>`;
                        }
                    });
                } catch (error) {
                    alert('A critical error occurred initializing the app: ' + error.message);
                }
            }

            // This function contains all the logic for the admin panel itself
            function initializeAdminPanel(db) {
                // All the working code for managing tasks, games, and redeem codes goes here.
                const redeemCodesCollection = db.collection('redeemCodes'); const redeemForm = document.getElementById('redeem-code-form'); const codeList = document.getElementById('code-list'); document.getElementById('generate-code-btn').addEventListener('click', () => { document.getElementById('redeem-code').value = 'SHIKA-' + Math.random().toString(36).substring(2, 10).toUpperCase(); }); redeemForm.addEventListener('submit', (e) => { e.preventDefault(); const codeId = document.getElementById('redeem-code').value.trim(); if (!codeId) return; const codeData = { amount: Number(document.getElementById('redeem-amount').value), maxUses: Number(document.getElementById('redeem-max-uses').value), uses: 0, claimedBy: [], createdAt: firebase.firestore.FieldValue.serverTimestamp() }; redeemCodesCollection.doc(codeId).set(codeData).then(() => { alert('Redeem code created successfully!'); redeemForm.reset(); }).catch(err => alert('Error creating code: ' + err.message)); }); const loadCodes = () => { redeemCodesCollection.orderBy('createdAt', 'desc').onSnapshot(snapshot => { codeList.innerHTML = ''; snapshot.forEach(doc => { const code = doc.data(); const li = document.createElement('li'); li.innerHTML = `<span><strong>${doc.id}</strong> | Amount: ₹${code.amount} | Uses: ${code.uses}/${code.maxUses}</span><button class="delete-btn" data-id="${doc.id}">Delete</button>`; codeList.appendChild(li); }); }); }; codeList.addEventListener('click', e => { if (e.target.classList.contains('delete-btn')) { const id = e.target.dataset.id; if (confirm(`Are you sure you want to delete code ${id}?`)) { redeemCodesCollection.doc(id).delete(); } } }); const tasksCollection = db.collection('tasks'); const taskForm = document.getElementById('task-form'); const taskList = document.getElementById('task-list'); const loadTasks = () => { tasksCollection.orderBy("order").onSnapshot(snapshot => { taskList.innerHTML = ""; snapshot.forEach(doc => { const task = doc.data(); const li = document.createElement("li"); li.innerHTML = `<span><strong>${task.title}</strong> (Order: ${task.order})</span><div><button class="edit-btn" data-id="${doc.id}">Edit</button><button class="delete-btn" data-id="${doc.id}">Delete</button></div>`; taskList.appendChild(li); }); }); }; taskForm.addEventListener("submit", e => { e.preventDefault(); const id = document.getElementById("task-id").value; const taskData = { title: document.getElementById("task-title").value, reward: document.getElementById("task-reward").value, imageUrl: document.getElementById("task-image-url").value, details: document.getElementById("task-details").value, actionUrl: document.getElementById("task-action-url").value, order: Number(document.getElementById("task-order").value) }; const promise = id ? tasksCollection.doc(id).update(taskData) : tasksCollection.add(taskData); promise.then(() => { alert(id ? "Task updated!" : "Task added!"); taskForm.reset(); document.getElementById("task-id").value = ""; }).catch(err => alert("Error saving task: " + err.message)); }); taskList.addEventListener("click", e => { const target = e.target; const id = target.getAttribute("data-id"); if (target.classList.contains("delete-btn") && confirm("Are you sure?")) { tasksCollection.doc(id).delete(); } if (target.classList.contains("edit-btn")) { tasksCollection.doc(id).get().then(doc => { const task = doc.data(); document.getElementById("task-id").value = doc.id; document.getElementById("task-title").value = task.title; document.getElementById("task-reward").value = task.reward; document.getElementById("task-image-url").value = task.imageUrl; document.getElementById("task-details").value = task.details; document.getElementById("task-action-url").value = task.actionUrl; document.getElementById("task-order").value = task.order; window.scrollTo(0, 0); }); } }); const gamesCollection = db.collection('games'); const gameForm = document.getElementById('game-form'); const gameList = document.getElementById('game-list'); const loadGames = () => { gamesCollection.orderBy('order').onSnapshot(snapshot => { gameList.innerHTML = ''; snapshot.forEach(doc => { const game = doc.data(); const li = document.createElement('li'); li.innerHTML = `<span><strong>${game.title}</strong> (Order: ${game.order})</span><div><button class="edit-btn" data-id="${doc.id}">Edit</button><button class="delete-btn" data-id="${doc.id}">Delete</button></div>`; gameList.appendChild(li); }); }); }; gameForm.addEventListener('submit', (e) => { e.preventDefault(); const id = document.getElementById('game-id').value; const gameData = { title: document.getElementById('game-title').value, imageUrl: document.getElementById('game-image-url').value, gameUrl: document.getElementById('game-url').value, order: Number(document.getElementById('game-order').value) }; const promise = id ? gamesCollection.doc(id).update(gameData) : gamesCollection.add(gameData); promise.then(() => { alert(id ? "Game updated!" : "Game added!"); gameForm.reset(); document.getElementById('game-id').value = ''; }).catch(err => alert("Error saving game: " + err.message)); }); gameList.addEventListener("click", e => { const target = e.target; const id = target.getAttribute("data-id"); if (target.classList.contains("delete-btn") && confirm("Are you sure?")) { gamesCollection.doc(id).delete(); } if (target.classList.contains("edit-btn")) { gamesCollection.doc(id).get().then(doc => { const game = doc.data(); document.getElementById('game-id').value = doc.id; document.getElementById('game-title').value = game.title; document.getElementById('game-image-url').value = game.imageUrl; document.getElementById('game-url').value = game.gameUrl; document.getElementById('game-order').value = game.order; gameForm.scrollIntoView({ behavior: 'smooth' }); }); } }); loadTasks(); loadGames(); loadCodes();
            }
        });
    </script>
</body>
</html>
