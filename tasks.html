<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks | ShikaXFusion</title>
    <link rel="stylesheet" href="main.css">
    <style>
        /* NEW: Style for disabled buttons */
        .task-action:disabled {
            background: grey;
            cursor: not-allowed;
            transform: none;
        }
        /* MODIFIED: Ensure link looks like a button */
        .task-action-link {
            display: inline-block; /* Makes padding and other styles work correctly */
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 8px 18px;
            background: var(--accent-gradient);
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s ease;
            text-decoration: none;
            color: var(--text-primary);
        }
        .task-action-link:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    <div class="grid-background"></div>
    <div class="orb-container"><div class="floating-orb orb-1"></div><div class="floating-orb orb-2"></div></div>

    <div class="app-container">
        <!-- MODIFIED: Page Header now has an ID to update the balance -->
        <header class="dashboard-header">
            <div class="header-left" id="user-balance-header">🇮🇳 ₹0.00</div>
            <div class="header-right">
                <div class="brand-name">ShikaXFusion</div>
                <div class="user-avatar" id="user-avatar-initial">...</div>
            </div>
        </header>

        <!-- Main Content for Tasks -->
        <main class="main-content">
            <div class="section-header">
                <h2>Special Offers</h2>
            </div>
            <div class="task-list-container">
                <!-- MODIFIED: "Daily Check-in" is now "Weekly Claim" -->
                <div class="task-item">
                    <div class="task-icon"><svg viewBox="0 0 24 24"><path d="M20 6h-2V4h2v2zm-4 0h-2V4h2v2zM8 6H6V4h2v2zm13 14H3V8h18v12zM5 10h14v8H5v-8z"/></svg></div>
                    <div class="task-details">
                        <span class="task-title">Weekly Claim</span>
                        <span class="task-reward">Claim your weekly ₹1 bonus!</span>
                    </div>
                    <!-- MODIFIED: Button is now a real button with an ID -->
                    <button class="task-action" id="weekly-claim-btn" disabled>Claim</button>
                </div>
                <!-- MODIFIED: "Read an Article" is now "Install & Withdraw" -->
                 <div class="task-item">
                    <div class="task-icon"><svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"></path></svg></div>
                    <div class="task-details">
                        <span class="task-title">Install & Withdraw</span>
                        <span class="task-reward">Earn ₹10</span>
                    </div>
                    <!-- MODIFIED: Action is now a link styled as a button -->
                    <a href="https://tinyurl.com/28aonvry" target="_blank" class="task-action-link">Go</a>
                </div>
            </div>

            <!-- This section can be used for more offers later -->
            <!--
            <div class="section-header">
                <h2>Other Offers</h2>
            </div>
            <div class="task-list-container">
                 ...
            </div>
            -->
        </main>
        
        <!-- Bottom Navigation: "Tasks" remains active -->
        <nav class="bottom-nav">
            <a href="/dashboard" class="nav-item"><svg viewBox="0 0 24 24"><path class="icon-fill" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Home</span></a>
            <a href="/tasks" class="nav-item active"><svg viewBox="0 0 24 24"><path class="icon-fill" d="M20.5 4.5H4.6C3.7 4 3 4.7 3 5.6v12.8C3 19.3 3.7 20 4.6 20h12.8c.9 0 1.6-.7 1.6-1.6V5.6c0-.9-.7-1.6-1.6-1.6zM18 18H6V6h12v12zM9 15h6v-2H9v2zm0-3h6v-2H9v2zm0-3h6V7H9v2z"/></svg><span>Tasks</span></a>
            <a href="/rewards" class="nav-item"><svg viewBox="0 0 24 24"><path class="icon-fill" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg><span>Rewards</span></a>
            <a href="/games" class="nav-item"><svg viewBox="0 0 24 24"><path class="icon-fill" d="M21.58 16.09l-1.1-1.1c-.29-.29-.69-.47-1.12-.52a5.95 5.95 0 00-2.86-2.86c-.05-.43-.23-.83-.52-1.12l-1.1-1.1a1.6 1.6 0 00-2.24 0l-1.1 1.1c-.29-.29-.47-.69-.52 1.12a5.95 5.95 0 00-2.86 2.86c-.05.43-.23-.83-.52-1.12l-1.1 1.1a1.6 1.6 0 000 2.24l1.1 1.1c.29-.29.69-.47 1.12-.52a5.95 5.95 0 002.86 2.86c.43.05.83.23 1.12.52l1.1 1.1a1.6 1.6 0 002.24 0l1.1-1.1c-.29-.29-.47-.69-.52-1.12a5.95 5.95 0 002.86-2.86c-.05-.43-.23-.83-.52-1.12l1.1-1.1a1.6 1.6 0 000-2.24zM12 15a3 3 0 110-6 3 3 0 010 6z"/></svg><span>Games</span></a>
            <a href="/profile" class="nav-item"><svg viewBox="0 0 24 24"><path class="icon-fill" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Profile</span></a>
        </nav>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <!-- ADDED: Firestore script is now required for dynamic data -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Particle system is unchanged
            class ParticleSystem { constructor(canvas) { this.canvas = canvas; this.ctx = canvas.getContext('2d'); this.particles = []; this.resize(); this.init(); this.animate(); window.addEventListener('resize', () => this.resize()); } resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; } init() { this.particles = []; const particleCount = 100; for (let i = 0; i < particleCount; i++) { this.particles.push({ x: Math.random() * this.canvas.width, y: Math.random() * this.canvas.height, vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5, size: Math.random() * 2 + 1, color: `hsl(${220 + Math.random() * 60}, 70%, 60%)` }); } } animate() { this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); this.particles.forEach(p => { p.x += p.vx; p.y += p.vy; if (p.x < 0 || p.x > this.canvas.width) p.vx *= -1; if (p.y < 0 || p.y > this.canvas.height) p.vy *= -1; this.ctx.fillStyle = p.color; this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); this.ctx.fill(); }); requestAnimationFrame(() => this.animate()); } }
            new ParticleSystem(document.getElementById('particles-canvas'));
            
            // Firebase Initialization
            const firebaseConfig = {
                apiKey: "AIzaSyCzFHkD5bAIjZkP1W7jj4P-FoBldmeTCpk",
                authDomain: "shikaxfusion.firebaseapp.com",
                projectId: "shikaxfusion",
                storageBucket: "shikaxfusion.appspot.com",
                messagingSenderId: "353890157797",
                appId: "1:353890157797:web:54607ce7378b97fc4d000c"
            };
            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore(); // Initialize Firestore
            
            // DOM Element References
            const avatarInitial = document.getElementById('user-avatar-initial');
            const userBalanceHeader = document.getElementById('user-balance-header');
            const weeklyClaimBtn = document.getElementById('weekly-claim-btn');

            // --- Authentication and Data Loading ---
            auth.onAuthStateChanged(user => {
                if (user) {
                    // Get user's document reference
                    const userRef = db.collection('users').doc(user.uid);

                    // Listen for real-time updates to the user's data
                    userRef.onSnapshot(doc => {
                        if (doc.exists) {
                            const data = doc.data();
                            // Update header with real data
                            userBalanceHeader.textContent = `🇮🇳 ₹${(data.balance || 0).toFixed(2)}`;
                            const displayName = user.displayName || user.email;
                            avatarInitial.textContent = displayName ? displayName.charAt(0).toUpperCase() : 'U';

                            // NEW LOGIC: Check weekly claim status
                            checkWeeklyClaimStatus(data);
                        }
                    });
                } else {
                    // If not logged in, redirect
                    window.location.replace('/auth');
                }
            });

            // --- NEW LOGIC: Weekly Claim Functionality ---
            function checkWeeklyClaimStatus(userData) {
                const now = new Date();
                const isMonday = now.getDay() === 1; // 0=Sun, 1=Mon, ...

                // Get the last claim date from Firestore, if it exists
                const lastClaimTimestamp = userData.lastWeeklyClaim;
                let lastClaimDate = null;
                if (lastClaimTimestamp) {
                    lastClaimDate = lastClaimTimestamp.toDate();
                }

                // Determine if a claim has been made this week
                let alreadyClaimedThisWeek = false;
                if (lastClaimDate) {
                    const msPerDay = 1000 * 60 * 60 * 24;
                    const daysSinceLastClaim = Math.floor((now - lastClaimDate) / msPerDay);
                    // If today is Monday and the last claim was less than 7 days ago, it means they claimed on a previous Monday in the same week cycle.
                    if (daysSinceLastClaim < 7) {
                         alreadyClaimedThisWeek = true;
                    }
                }
                
                // Enable or disable the button based on the checks
                if (isMonday && !alreadyClaimedThisWeek) {
                    weeklyClaimBtn.disabled = false;
                    weeklyClaimBtn.textContent = 'Claim ₹1';
                } else {
                    weeklyClaimBtn.disabled = true;
                    if (!isMonday) {
                        weeklyClaimBtn.textContent = 'Claim on Monday';
                    } else if (alreadyClaimedThisWeek) {
                        weeklyClaimBtn.textContent = 'Claimed';
                    }
                }
            }

            weeklyClaimBtn.addEventListener('click', () => {
                const user = auth.currentUser;
                if (!user) return; // Safety check

                weeklyClaimBtn.disabled = true; // Disable immediately to prevent double-clicks
                weeklyClaimBtn.textContent = 'Claiming...';

                const userRef = db.collection('users').doc(user.uid);
                const now = new Date();
                
                // Use a Firestore transaction to ensure data consistency
                db.runTransaction(transaction => {
                    return transaction.get(userRef).then(doc => {
                        if (!doc.exists) {
                            throw "Document does not exist!";
                        }
                        
                        // Recalculate claim status inside the transaction to be safe
                        const data = doc.data();
                        const isMonday = new Date().getDay() === 1;
                        let alreadyClaimedThisWeek = false;
                        if (data.lastWeeklyClaim) {
                           const daysSince = (new Date() - data.lastWeeklyClaim.toDate()) / (1000 * 60 * 60 * 24);
                           if (daysSince < 7) alreadyClaimedThisWeek = true;
                        }

                        if (!isMonday || alreadyClaimedThisWeek) {
                            // If conditions are not met, abort the transaction.
                            throw "Claim conditions not met!";
                        }

                        // Conditions are met, proceed with the update
                        const newBalance = (data.balance || 0) + 1;
                        const newHistoryEntry = {
                            amount: 1,
                            date: now,
                            description: "Weekly Claim Bonus",
                            type: "credit"
                        };
                        
                        transaction.update(userRef, {
                            balance: newBalance,
                            lastWeeklyClaim: now, // Update the last claim date
                            history: firebase.firestore.FieldValue.arrayUnion(newHistoryEntry)
                        });
                    });
                }).then(() => {
                    console.log("Weekly claim successful!");
                    alert("You have successfully claimed your weekly ₹1 bonus!");
                    weeklyClaimBtn.textContent = 'Claimed'; // Final state after success
                }).catch(error => {
                    console.error("Claim failed: ", error);
                    alert("Could not process your claim. It might be the wrong day, or you might have already claimed it this week.");
                    // Re-check status to reset button text appropriately
                    checkWeeklyClaimStatus(userRef.get().then(d => d.data()));
                });
            });
        });
    </script>
</body>
</html>
