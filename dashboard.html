<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FusionAuth - Dashboard</title>
    <style>
        /* This CSS matches the auth.html page for a seamless experience */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        :root { --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%); --accent-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); --dark-glass: rgba(15, 23, 42, 0.8); --neon-blue: #00d4ff; --neon-purple: #b537f7; --bg-darker: #020617; --text-primary: #ffffff; --text-secondary: rgba(255, 255, 255, 0.7); --border-glow: rgba(255, 255, 255, 0.2); --shadow-glow: 0 0 30px rgba(59, 130, 246, 0.3); --shadow-deep: 0 25px 50px -12px rgba(0, 0, 0, 0.6); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-darker); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; color: var(--text-primary); position: relative; }
        #particles-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.6; }
        .dashboard-container { position: relative; z-index: 10; background: var(--dark-glass); backdrop-filter: blur(20px) saturate(180%); border-radius: 24px; padding: 40px; width: 90%; max-width: 500px; text-align: center; box-shadow: var(--shadow-deep), var(--shadow-glow), inset 0 1px 0 rgba(255, 255, 255, 0.1); border: 1px solid var(--border-glow); }
        .dashboard-container h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 15px; background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .dashboard-container p { color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 30px; line-height: 1.6; }
        #user-identifier { font-weight: 600; color: var(--neon-blue); word-break: break-all; }
        .logout-btn { width: 100%; padding: 18px; background: var(--accent-gradient); color: var(--text-primary); border: none; border-radius: 16px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 0.5px; }
        .logout-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 35px -8px rgba(245, 87, 108, 0.6); }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>

    <div class="dashboard-container">
        <h1>Access Granted</h1>
        <p>Welcome to the portal. Your unique identifier is: <br><strong id="user-identifier">loading...</strong></p>
        <button class="logout-btn" id="logout-btn">Log Out</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script>
        // Particle system code can be smaller as it's just for background
        class ParticleSystem { constructor(canvas) { this.canvas = canvas; this.ctx = canvas.getContext('2d'); this.particles = []; this.resize(); this.init(); this.animate(); window.addEventListener('resize', () => this.resize()); } resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; } init() { this.particles = []; const particleCount = 100; for (let i = 0; i < particleCount; i++) { this.particles.push({ x: Math.random() * this.canvas.width, y: Math.random() * this.canvas.height, vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5, size: Math.random() * 2 + 1, color: `hsl(${220 + Math.random() * 60}, 70%, 60%)` }); } } animate() { this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); this.particles.forEach(p => { p.x += p.vx; p.y += p.vy; if (p.x < 0 || p.x > this.canvas.width) p.vx *= -1; if (p.y < 0 || p.y > this.canvas.height) p.vy *= -1; this.ctx.fillStyle = p.color; this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); this.ctx.fill(); }); requestAnimationFrame(() => this.animate()); } }
        
        document.addEventListener('DOMContentLoaded', () => {
            new ParticleSystem(document.getElementById('particles-canvas'));

            // *** PASTE YOUR REAL FIREBASE CONFIG HERE ***
            const firebaseConfig = {
                apiKey: "AIzaSyCzFHkD5bAIjZkP1W7jj4P-FoBldmeTCpk",
                authDomain: "shikaxfusion.firebaseapp.com",
                projectId: "shikaxfusion",
                storageBucket: "shikaxfusion.firebasestorage.app",
                messagingSenderId: "353890157797",
                appId: "1:353890157797:web:54607ce7378b97fc4d000c",
                measurementId: "G-6QYYNVG9NB"
            };

            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const userIdentifierSpan = document.getElementById('user-identifier');
            const logoutBtn = document.getElementById('logout-btn');

            auth.onAuthStateChanged(user => {
                if (user) {
                    // Display either phone number, email, or a unique ID.
                    const identifier = user.phoneNumber || user.email || user.uid;
                    userIdentifierSpan.textContent = identifier;
                } else {
                    // Not logged in, send back to the auth page.
                    window.location.replace('auth.html');
                }
            });

            logoutBtn.addEventListener('click', () => {
                auth.signOut(); // onAuthStateChanged will handle the redirect.
            });
        });
    </script>
</body>
</html>
