<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | ShikaXFusion</title>
    <style>
        /* --- 1. FONT AND DESIGN SYSTEM SETUP --- */
        @font-face {
            font-family: 'Million Smiles';
            src: url('Million-Smiles.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            /* Re-using the high-tech palette from your auth page */
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --bg-darker: #020617;
            --neon-blue: #00d4ff;
            --neon-purple: #b537f7;
            --neon-pink: #ff006e;
            --card-bg: rgba(20, 29, 58, 0.6);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* Applying the INTER font for UI text for readability */
            font-family: 'Inter', sans-serif;
            background: var(--bg-darker);
            min-height: 100vh;
            color: var(--text-primary);
            position: relative;
        }

        /* --- 2. BACKGROUND EFFECTS (Copied from auth.html) --- */
        #particles-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.6; }
        .grid-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(59, 130, 246, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(59, 130, 246, 0.1) 1px, transparent 1px); background-size: 50px 50px; animation: gridMove 20s linear infinite; z-index: 1; }
        @keyframes gridMove { from { transform: translate(0, 0); } to { transform: translate(50px, 50px); } }
        .floating-orb { position: absolute; border-radius: 50%; filter: blur(100px); animation: float 12s ease-in-out infinite; z-index: 1; }
        .orb-1 { width: 400px; height: 400px; background: var(--neon-blue); top: 10%; left: 10%; animation-delay: 0s; }
        .orb-2 { width: 300px; height: 300px; background: var(--neon-purple); top: 60%; right: 15%; animation-delay: -4s; }

        /* --- 3. MAIN APP STRUCTURE --- */
        .app-container {
            width: 100%;
            max-width: 430px; /* Standard mobile width */
            height: 100vh;
            margin: auto;
            background: rgba(0,0,0,0.2);
            border-left: 1px solid var(--card-border);
            border-right: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        /* --- 4. TOP HEADER --- */
        .app-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .balance-info { font-weight: 600; font-size: 1.2rem; }
        .brand-name {
            font-family: 'Million Smiles', cursive; /* Using your custom font */
            font-size: 2rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .user-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #f97794, #623aa2);
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        /* --- 5. MAIN SCROLLABLE CONTENT --- */
        .main-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 0 20px 20px 20px;
        }
        .main-content::-webkit-scrollbar { display: none; } /* Hide scrollbar */

        .welcome-message {
            margin-bottom: 25px;
        }
        .welcome-message h2 { font-size: 1.8rem; font-weight: 700; }
        .welcome-message p { color: var(--text-secondary); }

        /* --- 6. GAME CARDS --- */
        .game-cards-container {
            display: grid;
            gap: 20px;
        }
        .game-card {
            height: 250px;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .game-card:hover { transform: translateY(-5px) scale(1.02); }
        .game-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }
        .card-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.8) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
        }
        .card-top-info {
            position: absolute;
            top: 20px; left: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .playing-count { font-size: 0.8rem; background: rgba(0,0,0,0.4); padding: 5px 10px; border-radius: 20px; }
        .live-badge { font-size: 0.8rem; background: var(--neon-pink); padding: 5px 10px; border-radius: 20px; font-weight: 600; }
        
        .card-title {
            font-family: 'Million Smiles', cursive; /* Your custom font for titles */
            font-size: 2.5rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        .play-button {
            position: absolute;
            bottom: 20px; right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent-gradient);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .play-button svg { width: 24px; height: 24px; fill: white; margin-left: 3px; }

        /* --- 7. BOTTOM NAVIGATION BAR --- */
        .bottom-nav {
            flex-shrink: 0;
            margin: 0 20px 20px 20px;
            padding: 10px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 50px;
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s ease;
            background: none;
            border: none;
            padding: 5px 10px;
        }
        .nav-item.active { color: var(--text-primary); }
        .nav-item:hover { color: var(--text-primary); }
        .nav-item svg { width: 24px; height: 24px; }
        .nav-item span { font-size: 0.75rem; }

    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    <div class="grid-background"></div>
    <div class="orb-container">
        <div class="floating-orb orb-1"></div>
        <div class="floating-orb orb-2"></div>
    </div>

    <div class="app-container">
        <header class="app-header">
            <div class="balance-info">🇮🇳 ₹0.00</div>
            <div class="brand-name">ShikaXFusion</div>
            <div class="user-avatar" id="user-avatar-initial">S</div>
        </header>

        <main class="main-content">
            <div class="welcome-message">
                <h2 id="welcome-user-name">Welcome!</h2>
                <p>Explore games and win rewards.</p>
            </div>

            <div class="game-cards-container">
                <div class="game-card">
                    <img src="https://images.unsplash.com/photo-1546768292-fb12f6c92568?q=80&w=1964&auto=format&fit=crop" alt="Rocket">
                    <div class="card-overlay">
                        <div class="card-top-info">
                            <span class="playing-count">1.5K Playing</span>
                            <span class="live-badge">Live</span>
                        </div>
                        <h2 class="card-title">Aviator Crash</h2>
                        <button class="play-button">
                            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
                        </button>
                    </div>
                </div>
                 <!-- Add more game cards here -->
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path></svg>
                <span>Home</span>
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.5,4.5c-0.3-0.3-0.7-0.5-1.1-0.5H4.6C3.7,4,3,4.7,3,5.6v12.8c0,0.9,0.7,1.6,1.6,1.6h12.8c0.9,0,1.6-0.7,1.6-1.6V5.6C21,5.2,20.8,4.8,20.5,4.5z M18,18H6V6h12V18z M9,15h6v-2H9V15z M9,12h6v-2H9V12z M9,9h6V7H9V9z"></path></svg>
                <span>Tasks</span>
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20,12l-1.41-1.41L13,16.17V4h-2v12.17l-5.58-5.59L4,12l8,8L20,12z M20,20H4v2h16V20z"></path></svg>
                <span>Rewards</span>
            </a>
            <button id="logout-btn" class="nav-item">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.77,3.77L16,2L6,12l10,10l1.77-1.77L9.54,12L17.77,3.77z"></path></svg>
                <span>Logout</span>
            </button>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script>
        class ParticleSystem { /* ... Full particle system JS ... */ constructor(canvas) { this.canvas = canvas; this.ctx = canvas.getContext('2d'); this.particles = []; this.mouseX = 0; this.mouseY = 0; this.resize(); this.init(); this.animate(); window.addEventListener('resize', () => this.resize()); window.addEventListener('mousemove', (e) => { this.mouseX = e.clientX; this.mouseY = e.clientY; }); } resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; } init() { this.particles = []; const particleCount = Math.min(150, Math.floor((this.canvas.width * this.canvas.height) / 8000)); for (let i = 0; i < particleCount; i++) { this.particles.push({ x: Math.random() * this.canvas.width, y: Math.random() * this.canvas.height, vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5, size: Math.random() * 2 + 1, opacity: Math.random() * 0.8 + 0.2, color: `hsl(${220 + Math.random() * 60}, 70%, 60%)`, connections: 0 }); } } animate() { this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); this.particles.forEach((particle, i) => { const dx = this.mouseX - particle.x; const dy = this.mouseY - particle.y; const distance = Math.sqrt(dx * dx + dy * dy); if (distance < 150) { particle.vx += dx * 0.00005; particle.vy += dy * 0.00005; } particle.x += particle.vx; particle.y += particle.vy; if (particle.x < 0 || particle.x > this.canvas.width) particle.vx *= -1; if (particle.y < 0 || particle.y > this.canvas.height) particle.vy *= -1; this.ctx.save(); this.ctx.globalAlpha = particle.opacity; this.ctx.fillStyle = particle.color; this.ctx.shadowColor = particle.color; this.ctx.shadowBlur = 10; this.ctx.beginPath(); this.ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2); this.ctx.fill(); this.ctx.restore(); particle.connections = 0; for (let j = i + 1; j < this.particles.length && particle.connections < 3; j++) { const other = this.particles[j]; const dx = particle.x - other.x; const dy = particle.y - other.y; const distance = Math.sqrt(dx * dx + dy * dy); if (distance < 120) { particle.connections++; const opacity = (120 - distance) / 120 * 0.3; this.ctx.save(); this.ctx.globalAlpha = opacity; this.ctx.strokeStyle = '#3b82f6'; this.ctx.lineWidth = 0.5; this.ctx.beginPath(); this.ctx.moveTo(particle.x, particle.y); this.ctx.lineTo(other.x, other.y); this.ctx.stroke(); this.ctx.restore(); } } }); requestAnimationFrame(() => this.animate()); } }
        
        document.addEventListener('DOMContentLoaded', () => {
            new ParticleSystem(document.getElementById('particles-canvas'));

            const firebaseConfig = {
                apiKey: "AIzaSyCzFHkD5bAIjZkP1W7jj4P-FoBldmeTCpk",
                authDomain: "shikaxfusion.firebaseapp.com",
                projectId: "shikaxfusion",
                storageBucket: "shikaxfusion.firebasestorage.app",
                messagingSenderId: "353890157797",
                appId: "1:353890157797:web:54607ce7378b97fc4d000c",
                measurementId: "G-6QYYNVG9NB"
            };
            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();

            const welcomeUserName = document.getElementById('welcome-user-name');
            const avatarInitial = document.getElementById('user-avatar-initial');
            const logoutBtn = document.getElementById('logout-btn');

            auth.onAuthStateChanged(user => {
                if (user) {
                    // User is signed in.
                    const displayName = user.displayName;
                    if (displayName) {
                        welcomeUserName.textContent = `Welcome, ${displayName.split(' ')[0]}!`; // Greet by first name
                        avatarInitial.textContent = displayName.charAt(0).toUpperCase();
                    } else {
                        welcomeUserName.textContent = 'Welcome, User!';
                        avatarInitial.textContent = 'U';
                    }
                } else {
                    // No user is signed in. Redirect back to auth page.
                    window.location.replace('auth.html');
                }
            });

            logoutBtn.addEventListener('click', () => {
                auth.signOut();
            });
        });
    </script>
</body>
</html>
