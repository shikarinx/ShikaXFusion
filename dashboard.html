<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | ShikaXFusion</title>
    <style>
        @font-face {
            font-family: 'Million Smiles';
            src: url('Million-Smiles.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            /* High-tech palette from auth page */
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --bg-darker: #020617;
            --neon-blue: #00d4ff;
            --neon-purple: #b537f7;
            --neon-pink: #ff006e;
            --card-bg: rgba(20, 29, 58, 0.6);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-darker);
            min-height: 100vh;
            color: var(--text-primary);
            position: relative;
            overflow: hidden; /* Prevent body scroll */
        }

        /* --- BACKGROUND EFFECTS --- */
        #particles-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.6; }
        .grid-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(59, 130, 246, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(59, 130, 246, 0.1) 1px, transparent 1px); background-size: 50px 50px; animation: gridMove 20s linear infinite; z-index: 1; }
        @keyframes gridMove { from { transform: translate(0, 0); } to { transform: translate(50px, 50px); } }
        .floating-orb { position: absolute; border-radius: 50%; filter: blur(100px); animation: float 12s ease-in-out infinite; z-index: 1; }
        .orb-1 { width: 400px; height: 400px; background: var(--neon-blue); top: 10%; left: 10%; animation-delay: 0s; }
        .orb-2 { width: 300px; height: 300px; background: var(--neon-purple); top: 60%; right: 15%; animation-delay: -4s; }

        /* --- MAIN APP STRUCTURE --- */
        .app-container {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            margin: auto;
            background: rgba(0,0,0,0.2);
            border-left: 1px solid var(--card-border);
            border-right: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        /* --- HEADER (Re-structured) --- */
        .app-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .header-left { font-weight: 600; font-size: 1.2rem; }
        .header-right { display: flex; align-items: center; gap: 15px; }
        .brand-name {
            font-family: 'Million Smiles', cursive;
            font-size: 1.8rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .user-avatar {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, #f97794, #623aa2);
            border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem;
        }
        
        /* --- FUSION REACTOR ELEMENT --- */
        .fusion-reactor-container {
            display: flex; justify-content: center; align-items: center;
            height: 120px; flex-shrink: 0; margin: 10px 0;
        }
        .reactor { position: relative; width: 60px; height: 60px; }
        .reactor .core {
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle, var(--neon-blue), var(--neon-purple));
            box-shadow: 0 0 20px var(--neon-blue), 0 0 40px var(--neon-purple);
            animation: pulse-core 2s infinite ease-in-out;
        }
        @keyframes pulse-core { 50% { transform: scale(0.9); opacity: 0.8; } }
        .reactor .ring {
            position: absolute; top: 50%; left: 50%; border-radius: 50%;
            border: 2px solid; transform-style: preserve-3d;
        }
        .ring-1 { width: 150%; height: 150%; margin: -75% 0 0 -75%; border-color: var(--neon-blue); animation: orbit 6s linear infinite; }
        .ring-2 { width: 200%; height: 200%; margin: -100% 0 0 -100%; border-color: var(--neon-purple); animation: orbit 8s linear infinite reverse; }
        .ring-3 { width: 250%; height: 250%; margin: -125% 0 0 -125%; border-color: var(--neon-pink); animation: orbit 10s linear infinite; }
        @keyframes orbit { from { transform: rotateZ(0deg) rotateX(75deg); } to { transform: rotateZ(360deg) rotateX(75deg); } }

        /* --- MAIN CONTENT (Re-structured) --- */
        .main-content {
            flex-grow: 1;
            padding-left: 20px; /* Start padding for the first card */
            overflow: hidden; /* Hide vertical scroll, enable horizontal */
        }
        .section-header {
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 15px; padding-right: 20px;
        }
        .section-header h2 { font-size: 1.5rem; }
        .section-header a { color: var(--neon-blue); text-decoration: none; font-size: 0.9rem; }
        
        /* --- HORIZONTAL SCROLL CONTAINER --- */
        .horizontal-scroll-container {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 20px; /* Space for scrollbar, which is hidden */
            scroll-snap-type: x mandatory;
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        .horizontal-scroll-container::-webkit-scrollbar { display: none; } /* Chrome, Safari */
        
        .game-card {
            flex: 0 0 280px; /* Fixed width for cards */
            height: 350px;
            border-radius: 24px;
            overflow: hidden; position: relative;
            background: var(--card-bg); border: 1px solid var(--card-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            cursor: pointer; transition: transform 0.3s ease;
            scroll-snap-align: start; /* Snap to the start of each card */
        }
        .game-card:hover { transform: translateY(-5px); }
        .game-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .card-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.8) 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; }
        .card-top-info { position: absolute; top: 20px; left: 20px; display: flex; align-items: center; gap: 10px; }
        .playing-count { font-size: 0.8rem; background: rgba(0,0,0,0.4); padding: 5px 10px; border-radius: 20px; }
        .live-badge { font-size: 0.8rem; background: var(--neon-pink); padding: 5px 10px; border-radius: 20px; font-weight: 600; }
        .card-title { font-family: 'Million Smiles', cursive; font-size: 2.5rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .play-button { position: absolute; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: var(--accent-gradient); border: none; display: flex; align-items: center; justify-content: center; }
        .play-button svg { width: 24px; height: 24px; fill: white; margin-left: 3px; }

        /* --- BOTTOM NAVIGATION (New Design) --- */
        .bottom-nav {
            flex-shrink: 0; margin: 20px; padding: 10px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50px;
            backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #555; text-decoration: none; cursor: pointer; transition: color 0.2s ease; background: none; border: none; padding: 5px 10px; font-family: 'Inter', sans-serif; }
        .nav-item.active { color: var(--neon-pink); }
        .nav-item:hover { color: #000; }
        .nav-item svg { width: 24px; height: 24px; }
        .nav-item span { font-size: 0.75rem; font-weight: 600; }
        .nav-item .icon-fill { fill: #888; transition: fill 0.2s; }
        .nav-item .icon-stroke { stroke: #888; transition: stroke 0.2s; }
        .nav-item.active .icon-fill { fill: var(--neon-pink); }
        .nav-item.active .icon-stroke { stroke: var(--neon-blue); }
        .nav-item:hover .icon-fill, .nav-item:hover .icon-stroke { fill: #000; stroke: #000; }
        
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    <div class="grid-background"></div>
    <div class="orb-container"><div class="floating-orb orb-1"></div><div class="floating-orb orb-2"></div></div>

    <div class="app-container">
        <header class="app-header">
            <div class="header-left">🇮🇳 ₹0.00</div>
            <div class="header-right">
                <div class="brand-name">ShikaXFusion</div>
                <div class="user-avatar" id="user-avatar-initial">S</div>
            </div>
        </header>

        <div class="fusion-reactor-container">
            <div class="reactor">
                <div class="core"></div>
                <div class="ring ring-1"></div>
                <div class="ring ring-2"></div>
                <div class="ring ring-3"></div>
            </div>
        </div>

        <main class="main-content">
            <div class="section-header">
                <h2>Trending Offers</h2>
                <a href="#">View All ></a>
            </div>
            <div class="horizontal-scroll-container">
                <div class="game-card">
                    <img src="https://images.unsplash.com/photo-1546768292-fb12f6c92568?q=80&w=1964&auto=format&fit=crop" alt="Car Game">
                    <div class="card-overlay"><div class="card-top-info"><span class="live-badge">Live</span></div><h2 class="card-title">Aviator Crash</h2><button class="play-button"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg></button></div>
                </div>
                <div class="game-card">
                    <img src="https://images.unsplash.com/photo-1605647540924-852290f6b347?q=80&w=1964&auto=format&fit=crop" alt="Fantasy Game">
                    <div class="card-overlay"><div class="card-top-info"><span class="playing-count">3.2K Playing</span></div><h2 class="card-title">League Legends</h2><button class="play-button"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg></button></div>
                </div>
                <div class="game-card">
                    <img src="https://images.unsplash.com/photo-1580234811497-9df7fd2f357e?q=80&w=1964&auto=format&fit=crop" alt="Card Game">
                    <div class="card-overlay"><h2 class="card-title">Poker Pro</h2><button class="play-button"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg></button></div>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active">
                <svg viewBox="0 0 24 24"><path class="icon-stroke" d="M3 10v11h6v-7h6v7h6V10L12 3z" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" fill="none"/><path class="icon-fill" d="M3 10v11h6v-7h6v7h6V10L12 3z" style="fill: transparent;"/></svg>
                <span>Home</span>
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                <span>Tasks</span>
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
                <span>Rewards</span>
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 12h12M6 12l3.3-3.3M6 12l3.3 3.3M18 12l-3.3-3.3M18 12l-3.3 3.3M9 6h6M9 18h6"></path></svg>
                <span>Games</span>
            </a>
            <button id="logout-btn" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <span>Profile</span>
            </button>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script>
        class ParticleSystem { /* ... Full particle system JS ... */ constructor(canvas) { this.canvas = canvas; this.ctx = canvas.getContext('2d'); this.particles = []; this.mouseX = 0; this.mouseY = 0; this.resize(); this.init(); this.animate(); window.addEventListener('resize', () => this.resize()); window.addEventListener('mousemove', (e) => { this.mouseX = e.clientX; this.mouseY = e.clientY; }); } resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; } init() { this.particles = []; const particleCount = Math.min(150, Math.floor((this.canvas.width * this.canvas.height) / 8000)); for (let i = 0; i < particleCount; i++) { this.particles.push({ x: Math.random() * this.canvas.width, y: Math.random() * this.canvas.height, vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5, size: Math.random() * 2 + 1, opacity: Math.random() * 0.8 + 0.2, color: `hsl(${220 + Math.random() * 60}, 70%, 60%)`, connections: 0 }); } } animate() { this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); this.particles.forEach((particle, i) => { const dx = this.mouseX - particle.x; const dy = this.mouseY - particle.y; const distance = Math.sqrt(dx * dx + dy * dy); if (distance < 150) { particle.vx += dx * 0.00005; particle.vy += dy * 0.00005; } particle.x += particle.vx; particle.y += particle.vy; if (particle.x < 0 || particle.x > this.canvas.width) particle.vx *= -1; if (particle.y < 0 || particle.y > this.canvas.height) particle.vy *= -1; this.ctx.save(); this.ctx.globalAlpha = particle.opacity; this.ctx.fillStyle = particle.color; this.ctx.shadowColor = particle.color; this.ctx.shadowBlur = 10; this.ctx.beginPath(); this.ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2); this.ctx.fill(); this.ctx.restore(); particle.connections = 0; for (let j = i + 1; j < this.particles.length && particle.connections < 3; j++) { const other = this.particles[j]; const dx = particle.x - other.x; const dy = particle.y - other.y; const distance = Math.sqrt(dx * dx + dy * dy); if (distance < 120) { particle.connections++; const opacity = (120 - distance) / 120 * 0.3; this.ctx.save(); this.ctx.globalAlpha = opacity; this.ctx.strokeStyle = '#3b82f6'; this.ctx.lineWidth = 0.5; this.ctx.beginPath(); this.ctx.moveTo(particle.x, particle.y); this.ctx.lineTo(other.x, other.y); this.ctx.stroke(); this.ctx.restore(); } } }); requestAnimationFrame(() => this.animate()); } }
        
        document.addEventListener('DOMContentLoaded', () => {
            new ParticleSystem(document.getElementById('particles-canvas'));

            const firebaseConfig = {
                apiKey: "YOUR_SECURE_API_KEY", // IMPORTANT: Use your real, secure API key
                authDomain: "shikaxfusion.firebaseapp.com",
                projectId: "shikaxfusion",
                storageBucket: "shikaxfusion.firebasestorage.app",
                messagingSenderId: "353890157797",
                appId: "1:353890157797:web:54607ce7378b97fc4d000c",
                measurementId: "G-6QYYNVG9NB"
            };
            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();

            const avatarInitial = document.getElementById('user-avatar-initial');
            const logoutBtn = document.getElementById('logout-btn');

            auth.onAuthStateChanged(user => {
                if (user) {
                    const displayName = user.displayName;
                    if (displayName) {
                        avatarInitial.textContent = displayName.charAt(0).toUpperCase();
                    } else if (user.email) {
                        avatarInitial.textContent = user.email.charAt(0).toUpperCase();
                    } else {
                        avatarInitial.textContent = 'U';
                    }
                } else {
                    window.location.replace('auth.html');
                }
            });

            // The 'Profile' button now acts as the logout button
            logoutBtn.addEventListener('click', () => {
                auth.signOut();
            });
        });
    </script>
</body>
</html>
