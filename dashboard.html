<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Test</title>
    <!-- All CSS remains the same -->
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f0f2f5; color: #333; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        p { font-size: 1.2rem; color: #7f8c8d; margin-bottom: 30px; }
        #user-info { font-weight: bold; color: #2980b9; }
        #logout-btn { background-color: #e74c3c; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background-color 0.2s; }
        #logout-btn:hover { background-color: #c0392b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ Success!</h1>
        <p>You have been registered/logged in. <br> Your email is: <span id="user-info">loading...</span></p>
        <button id="logout-btn">Logout</button>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
        // *** THIS IS THE CORRECTED PART ***
        // Replace this with your NEW key after you generate it.
        const firebaseConfig = {
            apiKey: "AIzaSyCzFHkD5bAIjZkP1W7jj4P-FoBldmeTCpk",
            authDomain: "shikaxfusion.firebaseapp.com",
            projectId: "shikaxfusion",
            storageBucket: "shikaxfusion.firebasestorage.app",
            messagingSenderId: "353890157797",
            appId: "1:353890157797:web:54607ce7378b97fc4d000c",
            measurementId: "G-6QYYNVG9NB"
        };
        
        // --- All other JavaScript logic is correct and unchanged ---
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const userInfoSpan = document.getElementById('user-info');
        const logoutBtn = document.getElementById('logout-btn');

        auth.onAuthStateChanged(user => {
            if (user) {
                userInfoSpan.textContent = user.email;
            } else {
                // If user is not logged in, send them back to the auth page.
                window.location.replace('auth.html'); 
            }
        });

        logoutBtn.addEventListener('click', () => {
            auth.signOut().then(() => {
                console.log('User signed out.');
            }).catch(error => {
                console.error('Logout Error:', error);
                alert('Error signing out.');
            });
        });
    </script>
</body>
</html>
