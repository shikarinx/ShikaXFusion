<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rewards | ShikaXFusion</title>
    <link rel="stylesheet" href="main.css">
    <style>
        /* Additional styles specific to the rewards page can be added here */
        /* We can reuse the game grid styles for our rewards grid */
        .rewards-grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Creates a 2-column grid */
            gap: 15px; /* Space between grid items */
            padding: 0 20px;
        }

        .reward-card {
            border-radius: 18px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            transition: transform 0.3s ease;
            text-align: center;
            padding: 20px;
        }

        .reward-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        
        .reward-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .reward-title {
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .reward-cost {
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--neon-green);
            margin-bottom: 15px;
        }

        .redeem-btn {
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            background: var(--accent-gradient);
            color: var(--text-primary);
            padding: 8px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .redeem-btn:hover {
            transform: scale(1.05);
        }

    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    <div class="grid-background"></div>
    <div class="orb-container"><div class="floating-orb orb-1"></div><div class="floating-orb orb-2"></div></div>

    <div class="app-container">
        <!-- Page Header -->
        <header class="dashboard-header">
            <div class="header-left" id="user-balance-header">🇮🇳 ₹0.00</div>
            <div class="header-right">
                <div class="brand-name">ShikaXFusion</div>
                <div class="user-avatar" id="user-avatar-initial">...</div>
            </div>
        </header>

        <!-- Main Content for Rewards -->
        <main class="main-content">
            <div class="section-header">
                <h2>Redeem Rewards</h2>
            </div>
            
            <div class="rewards-grid-container">
                <!-- Example Reward 1 -->
                <div class="reward-card">
                    <div class="reward-icon">🎁</div>
                    <div class="reward-title">₹10 Gift Card</div>
                    <div class="reward-cost">1000 Coins</div>
                    <button class="redeem-btn">Redeem</button>
                </div>
                <!-- Example Reward 2 -->
                <div class="reward-card">
                    <div class="reward-icon">💸</div>
                    <div class="reward-title">₹50 Cash Voucher</div>
                    <div class="reward-cost">5000 Coins</div>
                    <button class="redeem-btn">Redeem</button>
                </div>
                <!-- Example Reward 3 -->
                <div class="reward-card">
                    <div class="reward-icon">💎</div>
                    <div class="reward-title">Exclusive Avatar</div>
                    <div class="reward-cost">2500 Coins</div>
                    <button class="redeem-btn">Redeem</button>
                </div>
                <!-- Example Reward 4 -->
                <div class="reward-card">
                    <div class="reward-icon">🎟️</div>
                    <div class="reward-title">Tournament Ticket</div>
                    <div class="reward-cost">500 Coins</div>
                    <button class="redeem-btn">Redeem</button>
                </div>
                <!-- Add more reward cards as needed -->
            </div>

        </main>
        
        <!-- Bottom Navigation: "Rewards" is now the active item -->
        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24"><path class="icon-fill" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Home</span></a>
            <a href="tasks.html" class="nav-item"><svg viewBox="0 0 24 24"><path class="icon-fill" d="M20.5 4.5H4.6C3.7 4 3 4.7 3 5.6v12.8C3 19.3 3.7 20 4.6 20h12.8c.9 0 1.6-.7 1.6-1.6V5.6c0-.9-.7-1.6-1.6-1.6zM18 18H6V6h12v12zM9 15h6v-2H9v2zm0-3h6v-2H9v2zm0-3h6V7H9v2z"/></svg><span>Tasks</span></a>
            <a href="rewards.html" class="nav-item active"><svg viewBox="0 0 24 24"><path class="icon-fill" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg><span>Rewards</span></a>
            <a href="games.html" class="nav-item"><svg viewBox="0 0 24 24"><path class="icon-fill" d="M21.58 16.09l-1.1-1.1c-.29-.29-.69-.47-1.12-.52a5.95 5.95 0 00-2.86-2.86c-.05-.43-.23-.83-.52-1.12l-1.1-1.1a1.6 1.6 0 00-2.24 0l-1.1 1.1c-.29-.29-.47-.69-.52 1.12a5.95 5.95 0 00-2.86 2.86c-.05.43-.23-.83-.52-1.12l-1.1 1.1a1.6 1.6 0 000 2.24l1.1 1.1c.29.29.69-.47 1.12-.52a5.95 5.95 0 002.86 2.86c.43.05.83.23 1.12.52l1.1 1.1a1.6 1.6 0 002.24 0l1.1-1.1c-.29-.29-.47-.69-.52-1.12a5.95 5.95 0 002.86-2.86c.05-.43.23-.83-.52-1.12l1.1-1.1a1.6 1.6 0 000-2.24zM12 15a3 3 0 110-6 3 3 0 010 6z"/></svg><span>Games</span></a>
            <a href="profile.html" class="nav-item"><svg viewBox="0 0 24 24"><path class="icon-fill" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Profile</span></a>
        </nav>
    </div>

    <!-- Firebase and Auth Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        let firebaseAuthReady = false;
        document.addEventListener('DOMContentLoaded', () => {
            // Reusable Particle System Class
            class ParticleSystem { constructor(canvas) { this.canvas = canvas; this.ctx = canvas.getContext('2d'); this.particles = []; this.resize(); this.init(); this.animate(); window.addEventListener('resize', () => this.resize()); } resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; } init() { this.particles = []; const particleCount = 100; for (let i = 0; i < particleCount; i++) { this.particles.push({ x: Math.random() * this.canvas.width, y: Math.random() * this.canvas.height, vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5, size: Math.random() * 2 + 1, color: `hsl(${220 + Math.random() * 60}, 70%, 60%)` }); } } animate() { this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); this.particles.forEach(p => { p.x += p.vx; p.y += p.vy; if (p.x < 0 || p.x > this.canvas.width) p.vx *= -1; if (p.y < 0 || p.y > this.canvas.height) p.vy *= -1; this.ctx.fillStyle = p.color; this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); this.ctx.fill(); }); requestAnimationFrame(() => this.animate()); } }
            new ParticleSystem(document.getElementById('particles-canvas'));
            
            // Firebase Initialization
            const firebaseConfig = {
                apiKey: "AIzaSyCzFHkD5bAIjZkP1W7jj4P-FoBldmeTCpk",
                authDomain: "shikaxfusion.firebaseapp.com",
                projectId: "shikaxfusion",
                storageBucket: "shikaxfusion.appspot.com",
                messagingSenderId: "353890157797",
                appId: "1:353890157797:web:54607ce7378b97fc4d000c"
            };
            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();
            
            // DOM Element References
            const avatarInitial = document.getElementById('user-avatar-initial');
            const userBalanceHeader = document.getElementById('user-balance-header');
            
            // Auth State Change Listener
            auth.onAuthStateChanged(user => {
                firebaseAuthReady = true;
                if (user) {
                    // Update avatar initial
                    const displayName = user.displayName || user.email;
                    if (displayName) {
                        avatarInitial.textContent = displayName.charAt(0).toUpperCase();
                    } else {
                        avatarInitial.textContent = 'U';
                    }
                    // Listen for real-time balance updates
                    db.collection('users').doc(user.uid).onSnapshot(doc => {
                        if (doc.exists) {
                            const data = doc.data();
                            userBalanceHeader.textContent = `🇮🇳 ₹${(data.balance || 0).toFixed(2)}`;
                        }
                    });
                } else {
                    // If not logged in, redirect to auth page
                    window.location.replace('auth.html');
                }
            });
        });
        
        // Fallback redirect if Firebase takes too long
        setTimeout(() => {
            if (!firebaseAuthReady) {
                 window.location.replace('auth.html');
            }
        }, 3000);
    </script>
</body>
</html>
