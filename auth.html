<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FusionAuth - Welcome</title>
    <!-- The CSS is unchanged and correct -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Allura&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        :root { --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%); --accent-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); --dark-glass: rgba(15, 23, 42, 0.8); --neon-blue: #00d4ff; --neon-purple: #b537f7; --neon-pink: #ff006e; --neon-green: #39ff14; --bg-darker: #020617; --text-primary: #ffffff; --text-secondary: rgba(255, 255, 255, 0.7); --text-muted: rgba(255, 255, 255, 0.5); --shadow-glow: 0 0 30px rgba(59, 130, 246, 0.3); --shadow-deep: 0 25px 50px -12px rgba(0, 0, 0, 0.6); --border-glow: rgba(255, 255, 255, 0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-darker); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; color: var(--text-primary); position: relative; }
        #particles-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.6; }
        .grid-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(59, 130, 246, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(59, 130, 246, 0.1) 1px, transparent 1px); background-size: 50px 50px; animation: gridMove 20s linear infinite; z-index: 1; }
        @keyframes gridMove { from { transform: translate(0, 0); } to { transform: translate(50px, 50px); } }
        .floating-orb { position: absolute; border-radius: 50%; filter: blur(100px); animation: float 12s ease-in-out infinite; z-index: 1; }
        .orb-1 { width: 400px; height: 400px; background: var(--neon-blue); top: 10%; left: 10%; animation-delay: 0s; }
        .orb-2 { width: 300px; height: 300px; background: var(--neon-purple); top: 60%; right: 15%; animation-delay: -4s; }
        .orb-3 { width: 200px; height: 200px; background: var(--neon-pink); bottom: 15%; left: 30%; animation-delay: -8s; }
        @keyframes float { 0%, 100% { transform: translateY(0px) scale(1); } 50% { transform: translateY(-40px) scale(1.1); } }
        .auth-container { position: relative; z-index: 10; background: var(--dark-glass); backdrop-filter: blur(20px) saturate(180%); border-radius: 24px; padding: 40px; width: 90%; max-width: 450px; box-shadow: var(--shadow-deep), var(--shadow-glow), inset 0 1px 0 rgba(255, 255, 255, 0.1); border: 1px solid var(--border-glow); overflow: hidden; }
        .auth-container::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--primary-gradient); border-radius: 24px 24px 0 0; }
        .auth-container::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(from 180deg at 50% 50%, rgba(255, 255, 255, 0) 0%, rgba(0, 212, 255, 0.2) 50%, rgba(255, 255, 255, 0) 100%); animation: rotate 8s linear infinite; z-index: -1; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        .auth-header { text-align: center; margin-bottom: 40px; position: relative; }
        .auth-header h1 { font-family: 'Allura', cursive; font-weight: normal; font-size: 4.5rem; letter-spacing: 2px; margin-bottom: -10px; background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-shadow: 0 0 20px rgba(181, 55, 247, 0.5); }
        .auth-header p { color: var(--text-secondary); font-size: 1rem; font-weight: 400; }
        .auth-header .logo-accent { display: none; }
        .auth-form { display: none; animation: slideIn 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .auth-form.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .form-group { margin-bottom: 24px; position: relative; }
        .form-group label { display: block; color: var(--text-secondary); font-size: 0.875rem; font-weight: 500; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .phone-input-group { display: flex; gap: 12px; }
        .country-select { flex: 0 0 120px; padding: 16px 12px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 16px; color: var(--text-primary); font-size: 0.9rem; cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(10px); }
        .country-select:focus, .country-select:hover { outline: none; border-color: var(--neon-blue); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); background: rgba(0, 0, 0, 0.6); }
        .form-group input { flex: 1; width: 100%; padding: 16px 20px; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 16px; background: rgba(0, 0, 0, 0.4); color: var(--text-primary); font-size: 1rem; font-weight: 400; transition: all 0.3s ease; backdrop-filter: blur(10px); }
        .form-group input:focus { outline: none; border-color: var(--neon-blue); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1), 0 8px 25px -8px rgba(59, 130, 246, 0.2); background: rgba(0, 0, 0, 0.6); }
        .form-group input::placeholder { color: var(--text-muted); font-weight: 400; }
        .submit-btn { width: 100%; padding: 18px; background: var(--accent-gradient); color: var(--text-primary); border: none; border-radius: 16px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 10px; position: relative; overflow: hidden; box-shadow: 0 8px 25px -8px rgba(245, 87, 108, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2); }
        .submit-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent); transition: left 0.5s; }
        .submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 12px 35px -8px rgba(245, 87, 108, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.3); }
        .submit-btn:hover:not(:disabled)::before { left: 100%; }
        .submit-btn:disabled { background: rgba(100, 100, 100, 0.5); cursor: not-allowed; transform: none; box-shadow: none; }
        .google-btn { width: 100%; padding: 16px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 16px; color: var(--text-primary); font-size: 1rem; font-weight: 500; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 12px; backdrop-filter: blur(10px); }
        .google-btn:hover:not(:disabled) { background: rgba(255, 255, 255, 0.2); transform: translateY(-1px); box-shadow: 0 8px 25px -8px rgba(255, 255, 255, 0.2); }
        .google-icon { width: 24px; height: 24px; }
        .divider { text-align: center; margin: 30px 0; position: relative; color: var(--text-muted); font-weight: 500; font-size: 0.875rem; }
        .divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent); }
        .divider span { background: var(--dark-glass); padding: 0 20px; position: relative; z-index: 1; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        .modal-overlay.visible { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--dark-glass); backdrop-filter: blur(20px); border: 1px solid var(--border-glow); padding: 40px 35px; border-radius: 24px; text-align: center; width: 90%; max-width: 380px; transform: scale(0.8) translateY(20px); transition: transform 0.4s ease; box-shadow: var(--shadow-deep), 0 0 40px rgba(255, 0, 110, 0.3); }
        .modal-overlay.visible .modal-content { transform: scale(1) translateY(0); }
        .modal-icon { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--neon-pink), #ff4757); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; font-size: 2.5rem; color: white; box-shadow: 0 0 30px rgba(255, 0, 110, 0.6), inset 0 2px 0 rgba(255, 255, 255, 0.2); }
        .modal-text { color: var(--text-primary); font-size: 1.4rem; font-weight: 600; margin-bottom: 12px; }
        .modal-description { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 30px; line-height: 1.5; }
        .modal-close-btn { padding: 16px 32px; border: none; border-radius: 12px; background: var(--primary-gradient); color: white; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 0.5px; }
        .modal-close-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px -8px rgba(102, 126, 234, 0.6); }
        .loading { position: relative; overflow: hidden; }
        .loading::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent); animation: loading-shimmer 1.5s infinite; }
        @keyframes loading-shimmer { to { left: 100%; } }
        #recaptcha-container { margin: 20px auto 0; display: flex; justify-content: center; }
        @media (max-width: 480px) { .auth-container { padding: 30px 25px; margin: 20px; } .auth-header h1 { font-size: 3.5rem; } .phone-input-group { flex-direction: column; } .country-select { flex: none; } }
    </style>
</head>
<body>
    <!-- HTML is unchanged -->
    <canvas id="particles-canvas"></canvas>
    <div class="grid-background"></div>
    <div class="orb-container"><div class="floating-orb orb-1"></div><div class="floating-orb orb-2"></div><div class="floating-orb orb-3"></div></div>
    <div class="auth-container">
        <form class="auth-form active" id="phone-form"><div class="auth-header"><h1>Welcome</h1><p>Please verify to continue</p></div><div class="form-group"><label for="phone-number-input">Phone Number</label><div class="phone-input-group"><select class="country-select" id="country-code"><option value="+91" selected>🇮🇳 +91</option><option value="+1">🇺🇸 +1</option><option value="+44">🇬🇧 +44</option></select><input type="tel" id="phone-number-input" placeholder="Enter mobile number" required></div></div><button type="submit" class="submit-btn" id="send-code-btn">Send Verification Code</button><div class="divider"><span>OR</span></div><button type="button" class="google-btn" id="google-signin-btn"><img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="google-icon">Continue with Google</button></form>
        <form class="auth-form" id="code-form"><div class="auth-header"><h1>Verify</h1><p>Enter the 6-digit code sent to your device</p></div><div class="form-group"><label for="verification-code-input">Verification Code</label><input type="text" id="verification-code-input" placeholder="000000" maxlength="6" inputmode="numeric" pattern="[0-9]*" required></div><button type="submit" class="submit-btn" id="verify-btn">Verify & Access Portal</button></form>
        <div id="recaptcha-container"></div>
    </div>
    <div id="same-device-modal" class="modal-overlay"><div class="modal-content"><div class="modal-icon">⚠</div><p class="modal-text">Device Already Registered</p><p class="modal-description">This device has been previously authenticated. For security purposes, please use a different device or contact support.</p><button id="modal-close" class="modal-close-btn">Understood</button></div></div>
    
    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script>
        // --- THIS IS THE CORRECTED PART ---
        class ParticleSystem { constructor(canvas) { this.canvas = canvas; this.ctx = canvas.getContext('2d'); this.particles = []; this.mouseX = 0; this.mouseY = 0; this.resize(); this.init(); this.animate(); window.addEventListener('resize', () => this.resize()); window.addEventListener('mousemove', (e) => { this.mouseX = e.clientX; this.mouseY = e.clientY; }); } resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; } init() { this.particles = []; const particleCount = Math.min(150, Math.floor((this.canvas.width * this.canvas.height) / 8000)); for (let i = 0; i < particleCount; i++) { this.particles.push({ x: Math.random() * this.canvas.width, y: Math.random() * this.canvas.height, vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5, size: Math.random() * 2 + 1, opacity: Math.random() * 0.8 + 0.2, color: `hsl(${220 + Math.random() * 60}, 70%, 60%)`, connections: 0 }); } } animate() { this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); this.particles.forEach((particle, i) => { const dx = this.mouseX - particle.x; const dy = this.mouseY - particle.y; const distance = Math.sqrt(dx * dx + dy * dy); if (distance < 150) { particle.vx += dx * 0.00005; particle.vy += dy * 0.00005; } particle.x += particle.vx; particle.y += particle.vy; if (particle.x < 0 || particle.x > this.canvas.width) particle.vx *= -1; if (particle.y < 0 || particle.y > this.canvas.height) particle.vy *= -1; particle.x = Math.max(0, Math.min(this.canvas.width, particle.x)); particle.y = Math.max(0, Math.min(this.canvas.height, particle.y)); this.ctx.save(); this.ctx.globalAlpha = particle.opacity; this.ctx.fillStyle = particle.color; this.ctx.shadowColor = particle.color; this.ctx.shadowBlur = 10; this.ctx.beginPath(); this.ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2); this.ctx.fill(); this.ctx.restore(); particle.connections = 0; for (let j = i + 1; j < this.particles.length && particle.connections < 3; j++) { const other = this.particles[j]; const dx = particle.x - other.x; const dy = particle.y - other.y; const distance = Math.sqrt(dx * dx + dy * dy); if (distance < 120) { particle.connections++; const opacity = (120 - distance) / 120 * 0.3; this.ctx.save(); this.ctx.globalAlpha = opacity; this.ctx.strokeStyle = '#3b82f6'; this.ctx.lineWidth = 0.5; this.ctx.beginPath(); this.ctx.moveTo(particle.x, particle.y); this.ctx.lineTo(other.x, other.y); this.ctx.stroke(); this.ctx.restore(); } } }); requestAnimationFrame(() => this.animate()); } }
        class DeviceDetector { constructor() { this.fingerprint = null; this.generateFingerprint(); } generateFingerprint() { const fingerprintData = [ navigator.userAgent, navigator.language, screen.colorDepth, `${screen.width}x${screen.height}`, new Date().getTimezoneOffset(), navigator.hardwareConcurrency, navigator.platform ]; const fingerprintString = fingerprintData.join('||'); let hash = 0; for (let i = 0; i < fingerprintString.length; i++) { const char = fingerprintString.charCodeAt(i); hash = ((hash << 5) - hash) + char; hash = hash & hash; } this.fingerprint = `fusion_device_${hash}`; } getFingerprint() { return this.fingerprint; } }
        
        document.addEventListener('DOMContentLoaded', () => {
            new ParticleSystem(document.getElementById('particles-canvas'));
            const deviceDetector = new DeviceDetector();

            // *** PASTE YOUR REAL FIREBASE CONFIG HERE ***
            const firebaseConfig = {
                apiKey: "AIzaSyCzFHkD5bAIjZkP1W7jj4P-FoBldmeTCpk",
                authDomain: "shikaxfusion.firebaseapp.com",
                projectId: "shikaxfusion",
                storageBucket: "shikaxfusion.firebasestorage.app",
                messagingSenderId: "353890157797",
                appId: "1:353890157797:web:54607ce7378b97fc4d000c",
                measurementId: "G-6QYYNVG9NB"
            };
            
            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const googleProvider = new firebase.auth.GoogleAuthProvider();

            const phoneForm = document.getElementById('phone-form');
            const codeForm = document.getElementById('code-form');
            const countryCodeSelect = document.getElementById('country-code');
            const phoneNumberInput = document.getElementById('phone-number-input');
            const verificationCodeInput = document.getElementById('verification-code-input');
            const googleBtn = document.getElementById('google-signin-btn');
            const sendCodeBtn = document.getElementById('send-code-btn');
            const verifyBtn = document.getElementById('verify-btn');
            const modal = document.getElementById('same-device-modal');
            const modalCloseBtn = document.getElementById('modal-close');

            if (localStorage.getItem(deviceDetector.getFingerprint())) { modal.classList.add('visible'); phoneForm.style.display = 'none'; }
            modalCloseBtn.addEventListener('click', () => modal.classList.remove('visible'));

            const setLoading = (button, isLoading) => { button.disabled = isLoading; if (isLoading) button.classList.add('loading'); else button.classList.remove('loading'); };

            window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });

            phoneForm.addEventListener('submit', (e) => {
                e.preventDefault(); setLoading(sendCodeBtn, true);
                const fullPhoneNumber = countryCodeSelect.value + phoneNumberInput.value;
                auth.signInWithPhoneNumber(fullPhoneNumber, window.recaptchaVerifier)
                    .then(confirmationResult => { window.confirmationResult = confirmationResult; phoneForm.classList.remove('active'); codeForm.classList.add('active'); })
                    .catch(error => alert(`Error: ${error.message}`)).finally(() => setLoading(sendCodeBtn, false));
            });

            codeForm.addEventListener('submit', (e) => {
                e.preventDefault(); setLoading(verifyBtn, true);
                if (window.confirmationResult) {
                    window.confirmationResult.confirm(verificationCodeInput.value)
                        .catch(error => alert(`Invalid Code: ${error.message}`)).finally(() => setLoading(verifyBtn, false));
                } else { alert("Please send a code first."); setLoading(verifyBtn, false); }
            });
            
            googleBtn.addEventListener('click', () => {
                setLoading(googleBtn, true);
                auth.signInWithPopup(googleProvider)
                    .catch(error => alert(`Google Sign-In Error: ${error.message}`)).finally(() => setLoading(googleBtn, false));
            });

            auth.onAuthStateChanged(user => {
                if (user) {
                    localStorage.setItem(deviceDetector.getFingerprint(), 'true');
                    alert('Authentication successful! Redirecting...');
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                }
            });
        });
    </script>
</body>
